name: Main CI - Build, Test, Deploy, and Release

on:
  workflow_dispatch:
    inputs:
      nonlive_testing_mode:
        description: 'Enable nonlive testing mode (start EC2 + allocate EIP). Re-run with this OFF when done.'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-nonlive:
    name: Deploy to Nonlive
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_PIPELINE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-3' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ~1.0

      - name: Create backend config
        working-directory: ./terraform/resources
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ vars.TF_STATE_BUCKET }}"
          key            = "resources/nonlive/bball-app-user-service.tfstate"
          region         = "${{ vars.AWS_REGION || 'eu-west-3' }}"
          dynamodb_table = "${{ vars.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ./terraform/resources
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ./terraform/resources
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform/resources
        run: |
          terraform plan -var-file="nonlive.tfvars" \
            -var="ec2_auto_start=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nonlive_testing_mode == 'true' || false }}" \
            -var="create_ec2_eip=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nonlive_testing_mode == 'true' || false }}" \
            -no-color

      - name: Terraform Apply
        working-directory: ./terraform/resources
        run: |
          terraform apply -var-file="nonlive.tfvars" \
            -var="ec2_auto_start=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nonlive_testing_mode == 'true' || false }}" \
            -var="create_ec2_eip=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nonlive_testing_mode == 'true' || false }}" \
            -auto-approve -no-color

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Deploy application to nonlive EC2
        run: bash scripts/deploy.sh nonlive ${{ vars.DEPLOYMENT_BUCKET }} 0

  deploy-live:
    name: Deploy to Live (Production)
    runs-on: ubuntu-latest
    needs: deploy-nonlive
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_PIPELINE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-3' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ~1.0

      - name: Create backend config
        working-directory: ./terraform/resources
        run: |
          cat > backend.hcl << EOF
          bucket         = "${{ vars.TF_STATE_BUCKET }}"
          key            = "resources/live/bball-app-user-service.tfstate"
          region         = "${{ vars.AWS_REGION || 'eu-west-3' }}"
          dynamodb_table = "${{ vars.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ./terraform/resources
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ./terraform/resources
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform/resources
        run: terraform plan -var-file="live.tfvars" -var='alarm_emails=${{ secrets.ALARM_EMAILS }}' -no-color

      - name: Terraform Apply
        working-directory: ./terraform/resources
        run: terraform apply -var-file="live.tfvars" -var='alarm_emails=${{ secrets.ALARM_EMAILS }}' -auto-approve -no-color

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Deploy application to live EC2
        run: bash scripts/deploy.sh live ${{ vars.DEPLOYMENT_BUCKET }} 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-live
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create deployment ZIP
        run: |
          zip -r bball-app-user-service.zip dist/ package.json package-lock.json
          ls -lh bball-app-user-service.zip

      - name: Get next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            Automated release of version ${{ steps.version.outputs.version }}

            ### Build Information
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Node.js Version: 24
            - Runtime: EC2 (Node.js + PM2)

            ### Deployment
            - Environment: Live (Production)
            - EC2 Instance: bball-app-user-service-server-live
            - Region: eu-west-3

            ### Infrastructure
            - EC2 Instance: bball-app-user-service-server-live
            - DynamoDB Table: bball-app-user-service-users-live
            - Cognito User Pool: bball-app-user-service-user-pool-live
            - CloudWatch Log Group: /bball-app/user-service/live

            ### Artifacts
            - `bball-app-user-service.zip` - Application deployment package
          files: |
            bball-app-user-service.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
